<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-labelledby="title desc">
  <title id="title">Empress Mod Manager mark</title>
  <desc id="desc">A sharp red and blue sigil with a crowned E at the center.</desc>
  <defs>
    <linearGradient id="bg" x1="18" y1="12" x2="112" y2="116" gradientUnits="userSpaceOnUse">
      <stop stop-color="#040812"/>
      <stop offset="1" stop-color="#14060d"/>
    </linearGradient>
    <linearGradient id="edge" x1="20" y1="18" x2="108" y2="110" gradientUnits="userSpaceOnUse">
      <stop stop-color="#60a5fa"/>
      <stop offset="0.52" stop-color="#1d4ed8"/>
      <stop offset="1" stop-color="#ef4444"/>
    </linearGradient>
    <linearGradient id="core" x1="30" y1="24" x2="98" y2="100" gradientUnits="userSpaceOnUse">
      <stop stop-color="#f87171"/>
